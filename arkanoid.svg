<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2552"/>
      <stop offset="1" stop-color="#070b1c"/>
    </linearGradient>
    <radialGradient id="ballg" cx="0.35" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#ffe27a"/>
      <stop offset="1" stop-color="#ff9a1f"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="8" y="8" width="240" height="240" rx="44" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#aebbff" opacity="0.8">
    <circle cx="48" cy="170" r="2"/>
    <circle cx="210" cy="60" r="2"/>
    <circle cx="196" cy="150" r="1.6"/>
    <circle cx="64" cy="64" r="1.6"/>
    <circle cx="150" cy="40" r="1.4"/>
  </g>

  <!-- bricks: 3 rows x 4 -->
  <g stroke="#000000" stroke-opacity="0.35" stroke-width="1.5">
    <!-- row 1 -->
    <g>
      <rect x="28" y="48"  width="44" height="20" rx="4" fill="#ff4d4d"/>
      <rect x="80" y="48"  width="44" height="20" rx="4" fill="#ff8a3d"/>
      <rect x="132" y="48" width="44" height="20" rx="4" fill="#ff4d4d"/>
      <rect x="184" y="48" width="44" height="20" rx="4" fill="#ff8a3d"/>
    </g>
    <!-- row 2 -->
    <g>
      <rect x="28" y="76"  width="44" height="20" rx="4" fill="#39d353"/>
      <rect x="80" y="76"  width="44" height="20" rx="4" fill="#3dd6c4"/>
      <rect x="132" y="76" width="44" height="20" rx="4" fill="#39d353"/>
      <rect x="184" y="76" width="44" height="20" rx="4" fill="#3dd6c4"/>
    </g>
    <!-- row 3 -->
    <g>
      <rect x="28" y="104"  width="44" height="20" rx="4" fill="#4d8bff"/>
      <rect x="80" y="104"  width="44" height="20" rx="4" fill="#9a5cff"/>
      <rect x="132" y="104" width="44" height="20" rx="4" fill="#4d8bff"/>
      <rect x="184" y="104" width="44" height="20" rx="4" fill="#9a5cff"/>
    </g>
  </g>
  <!-- brick highlights -->
  <g fill="#ffffff" opacity="0.25">
    <rect x="31" y="50"  width="38" height="4" rx="2"/>
    <rect x="83" y="50"  width="38" height="4" rx="2"/>
    <rect x="135" y="50" width="38" height="4" rx="2"/>
    <rect x="187" y="50" width="38" height="4" rx="2"/>
    <rect x="31" y="78"  width="38" height="4" rx="2"/>
    <rect x="83" y="78"  width="38" height="4" rx="2"/>
    <rect x="135" y="78" width="38" height="4" rx="2"/>
    <rect x="187" y="78" width="38" height="4" rx="2"/>
    <rect x="31" y="106"  width="38" height="4" rx="2"/>
    <rect x="83" y="106"  width="38" height="4" rx="2"/>
    <rect x="135" y="106" width="38" height="4" rx="2"/>
    <rect x="187" y="106" width="38" height="4" rx="2"/>
  </g>

  <!-- ball with glow -->
  <circle cx="170" cy="158" r="22" fill="#ffe27a" opacity="0.25"/>
  <circle cx="170" cy="158" r="14" fill="url(#ballg)"/>

  <!-- paddle -->
  <rect x="78" y="206" width="100" height="20" rx="10" fill="#2b3566"/>
  <rect x="84" y="208" width="88" height="6" rx="3" fill="#7e93e0"/>
</svg>
